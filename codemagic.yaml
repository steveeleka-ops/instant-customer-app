workflows:
  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: 3.7.12
      xcode: 26.0
      cocoapods: default
      groups:
        - ios_credentials
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.app.steve.instant" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get packages
        script: flutter pub get
      - name: Remove alpha channel from app icon
        script: |
          # Apple rejects icons with transparency (error 90717).
          # Use Python/Pillow (available on Codemagic) to flatten onto white background.
          python3 -c "
from PIL import Image
img = Image.open('assets/icon/icon.png').convert('RGBA')
bg = Image.new('RGBA', img.size, (255, 255, 255, 255))
bg.paste(img, mask=img.split()[3])
bg.convert('RGB').save('assets/icon/icon.png', 'PNG')
print('Alpha channel removed successfully')
"
      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons:main
      - name: Build iOS IPA
        script: |
          # Patch export_options.plist: Xcode 16 requires 'app-store-connect' not 'app-store'
          if [ -f /Users/builder/export_options.plist ]; then
            plutil -replace method -string "app-store-connect" /Users/builder/export_options.plist || true
          fi
          flutter build ipa --release \
            --build-name=1.0.5 \
            --build-number=44 \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-release:
    name: Android Release (AAB)
    max_build_duration: 90
    environment:
      flutter: 3.7.12
      java: 11
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionName=1.0.5" >> android/local.properties
          echo "flutter.versionCode=44" >> android/local.properties
      - name: Get packages
        script: flutter pub get
      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons:main
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-name=1.0.5 \
            --build-number=44
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
