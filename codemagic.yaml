workflows:
  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 90
    environment:
      flutter: 3.7.12
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "35218003-cc53-4678-8d79-e9bb92376139"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "QY2D8FBXM6"
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          echo $APP_STORE_CONNECT_PRIVATE_KEY | base64 --decode > /tmp/AuthKey.p8
          app-store-connect fetch-signing-files com.app.steve.instant \
            --type IOS_APP_STORE \
            --private-key /tmp/AuthKey.p8 \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get packages
        script: flutter pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.5 \
            --build-number=44 \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        api_key_encoding: base64

  android-release:
    name: Android Release (AAB)
    max_build_duration: 90
    environment:
      flutter: 3.7.12
      java: 11
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionName=1.0.5" >> android/local.properties
          echo "flutter.versionCode=44" >> android/local.properties
      - name: Get packages
        script: flutter pub get
      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons:main
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-name=1.0.5 \
            --build-number=44
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
